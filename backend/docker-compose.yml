services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval \"db.adminCommand('ping')\" --quiet"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 20
    networks:
      - app-network

  api:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      MONGODB_URI: "mongodb://mongodb:27017/pdf_db"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      PDF_STORAGE_PATH: "storage/pdfs"
    command: ["node", "dist/app.js"]
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  worker:
    build: .
    env_file:
      - .env
    environment:
      MONGODB_URI: "mongodb://mongodb:27017/pdf_db"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      PDF_STORAGE_PATH: "storage/pdfs"
    command: ["node", "dist/documentWorker.js"]
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 1
    networks:
      - app-network

volumes:
  mongo-data:

networks:
  app-network:
    driver: bridge
